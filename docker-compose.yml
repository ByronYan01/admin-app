services:
  admin-app-nginx:
    image: nginx:stable
    container_name: admin-app-nginx
    ports:
      - "8905:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./docker-conf/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3